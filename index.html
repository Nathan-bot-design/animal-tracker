<!DOCTYPE html>
<html>
<head>
    <title>Animal Tracker PRO</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-draw/dist/leaflet.draw.css"/>

    <!-- Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
        }

        #map {
            height: 70vh;
        }

        #info {
            background: #111827;
            color: white;
            padding: 15px;
            border-radius: 15px 15px 0 0;
            box-shadow: 0 -3px 10px rgba(0,0,0,0.4);
        }

        .row {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            font-size: 16px;
        }

        .material-icons {
            margin-right: 8px;
            color: #38bdf8;
        }

        #status {
            font-weight: bold;
            padding: 6px 12px;
            border-radius: 20px;
            margin-left: 10px;
            font-size: 14px;
        }

        .safe {
            background: #16a34a;
        }

        .outside {
            background: #dc2626;
        }

        @media (max-width: 600px) {
            #map {
                height: 65vh;
            }
            .row {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

<div id="map"></div>

<div id="info">
    <div class="row">
        <span class="material-icons">location_on</span>
        <span>Lat: <b id="lat">Waiting...</b></span>
    </div>

    <div class="row">
        <span class="material-icons">explore</span>
        <span>Lon: <b id="lon">Waiting...</b></span>
    </div>

    <div class="row">
        <span class="material-icons">pets</span>
        Status:
        <span id="status">Waiting...</span>
    </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw/dist/leaflet.draw.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "animaltracker-4c1ae.firebaseapp.com",
    databaseURL: "https://animaltracker-4c1ae-default-rtdb.firebaseio.com",
    projectId: "animaltracker-4c1ae",
    storageBucket: "animaltracker-4c1ae.firebasestorage.app",
    messagingSenderId: "433053348974",
    appId: "1:433053348974:web:ac49af5191dfb32f21227f"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const map = L.map('map').setView([-1.2921, 36.8219], 15);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

/* Custom Animal Icon */
const animalIcon = L.icon({
    iconUrl: "https://cdn-icons-png.flaticon.com/512/616/616408.png",
    iconSize: [40, 40],
});

let marker = L.marker([-1.2921, 36.8219], {icon: animalIcon}).addTo(map);

const drawnItems = new L.FeatureGroup();
map.addLayer(drawnItems);
let currentPolygon = null;

const drawControl = new L.Control.Draw({
    draw: { polygon: true, rectangle: false, circle: false, marker: false, polyline: false },
    edit: { featureGroup: drawnItems }
});
map.addControl(drawControl);

/* Save Fence */
map.on(L.Draw.Event.CREATED, function (e) {

    drawnItems.clearLayers();
    currentPolygon = e.layer;
    drawnItems.addLayer(currentPolygon);

    remove(ref(db, 'fence'));

    const coords = currentPolygon.getLatLngs()[0];
    coords.forEach((point, index) => {
        set(ref(db, 'fence/' + index), {
            lat: point.lat,
            lon: point.lng
        });
    });

    alert("Fence Saved!");
});

/* Load Fence */
onValue(ref(db, 'fence'), (snapshot) => {

    drawnItems.clearLayers();
    const data = snapshot.val();
    if (!data) return;

    let coords = [];
    Object.keys(data).forEach(key => {
        coords.push([data[key].lat, data[key].lon]);
    });

    if (coords.length > 0) {
        currentPolygon = L.polygon(coords, { color: 'green' });
        drawnItems.addLayer(currentPolygon);
    }
});

/* Point in Polygon */
function pointInPolygon(point, vs) {
    let x = point[0], y = point[1];
    let inside = false;
    for (let i = 0, j = vs.length - 1; i < vs.length; j = i++) {
        let xi = vs[i][0], yi = vs[i][1];
        let xj = vs[j][0], yj = vs[j][1];
        let intersect = ((yi > y) != (yj > y)) &&
            (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
        if (intersect) inside = !inside;
    }
    return inside;
}

/* Listen to Animal */
onValue(ref(db, 'animal'), (snapshot) => {

    const data = snapshot.val();
    if (!data || !data.lat || !data.lon) return;

    const lat = data.lat;
    const lon = data.lon;

    document.getElementById("lat").innerText = lat.toFixed(6);
    document.getElementById("lon").innerText = lon.toFixed(6);

    marker.setLatLng([lat, lon]);
    map.setView([lat, lon], 17);

    if (!currentPolygon) return;

    const polyCoords = currentPolygon.getLatLngs()[0].map(p => [p.lat, p.lng]);
    const inside = pointInPolygon([lat, lon], polyCoords);

    const statusEl = document.getElementById("status");

    if (inside) {
        statusEl.innerText = "SAFE";
        statusEl.className = "safe";
        currentPolygon.setStyle({ color: 'green' });
        set(ref(db, 'animal/status'), "SAFE");
    } else {
        statusEl.innerText = "OUTSIDE";
        statusEl.className = "outside";
        currentPolygon.setStyle({ color: 'red' });
        set(ref(db, 'animal/status'), "OUTSIDE");

        if (Notification.permission === "granted") {
            new Notification("⚠ Animal Left Fence!");
        }
    }
});

if ("Notification" in window) {
    Notification.requestPermission();
}

</script>
</body>
</html>
