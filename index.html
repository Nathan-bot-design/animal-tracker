<!DOCTYPE html>
<html>
<head>
<title>Animal Tracker PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet"
href="https://unpkg.com/leaflet-draw/dist/leaflet.draw.css"/>

<style>
body { margin:0; font-family:Arial; }
#map { height:75vh; }

#info {
  padding:20px;
  background:#111;
  color:white;
  font-size:22px;
}

#status {
  font-weight:bold;
  padding:10px 15px;
  border-radius:8px;
  font-size:26px;
  display:inline-block;
  margin-top:10px;
}

.leaflet-control-zoom a {
  font-size:24px !important;
}
</style>
</head>

<body>

<div id="info">
  Latitude: <span id="lat">Waiting...</span><br>
  Longitude: <span id="lon">Waiting...</span><br>
  Status: <span id="status">Waiting...</span>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw/dist/leaflet.draw.js"></script>

<script type="module">

import { initializeApp } from 
"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from 
"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAc5p2eXYUXctH00qCOVlK-OGX9KmnQHqE",
  databaseURL: "https://animaltracker-4c1ae-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const map = L.map('map').setView([-1.2921,36.8219],15);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map);

const animalIcon = L.icon({
  iconUrl: "https://cdn-icons-png.flaticon.com/512/616/616408.png",
  iconSize: [50,50]
});

let marker = L.marker([-1.2921,36.8219],{icon:animalIcon}).addTo(map);

onValue(ref(db,'animal'),snapshot=>{
  const data=snapshot.val();
  if(!data) return;

  const lat=data.lat;
  const lon=data.lon;

  document.getElementById("lat").innerText=lat.toFixed(6);
  document.getElementById("lon").innerText=lon.toFixed(6);

  marker.setLatLng([lat,lon]);
  map.setView([lat,lon],17);
});

</script>
</body>
</html>
