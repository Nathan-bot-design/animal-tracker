<!DOCTYPE html>
<html>
<head>
<title>Animal Tracker PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-draw/dist/leaflet.draw.css"/>

<style>
body { margin:0; font-family:Arial; display:flex; flex-direction:column; height:100vh; }
#map { flex:1; }

#info {
  display:flex;
  flex-direction: column;
  gap:10px;
  padding:15px;
  background:#111;
  color:white;
  font-size:20px;
}

#coords {
  display:flex;
  justify-content: space-between;
  font-size:18px;
}

#status {
  font-weight:bold;
  padding:15px;
  border-radius:10px;
  font-size:28px;
  text-align:center;
  color:white;
}

/* Make Leaflet Draw toolbar fully visible on mobile */
.leaflet-draw-toolbar {
  display: block !important;
  position: absolute !important;
  top: 10px;
  left: 10px;
  z-index: 1000;
}

.leaflet-draw-toolbar a {
  font-size: 24px !important;
  width: 50px !important;
  height: 50px !important;
  line-height: 50px !important;
}

.leaflet-control-zoom a {
  font-size: 24px !important;
}

@media (max-width: 768px) {
  #info { font-size:18px; padding:10px; }
  #coords { font-size:16px; }
  #status { font-size:24px; padding:15px; }
}
</style>
</head>

<body>

<div id="info">
  <div id="coords">
    <div>Latitude: <span id="lat">Waiting...</span></div>
    <div>Longitude: <span id="lon">Waiting...</span></div>
  </div>
  <div id="status">Waiting...</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw/dist/leaflet.draw.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAc5p2eXYUXctH00qCOVlK-OGX9KmnQHqE",
  databaseURL: "https://animaltracker-4c1ae-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// Map
const map = L.map('map').setView([-1.2921, 36.8219], 15);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

const animalIcon = L.icon({
  iconUrl: "https://cdn-icons-png.flaticon.com/512/616/616408.png",
  iconSize: [50,50]
});

let marker = L.marker([-1.2921, 36.8219], {icon: animalIcon}).addTo(map);

// Drawn Fence
const drawnItems = new L.FeatureGroup();
map.addLayer(drawnItems);
let currentPolygon = null;

const drawControl = new L.Control.Draw({
  draw: { polygon: true, rectangle: false, circle: false, marker: false, polyline: false },
  edit: { featureGroup: drawnItems }
});
map.addControl(drawControl);

// Save Fence
map.on(L.Draw.Event.CREATED, function(e) {
  drawnItems.clearLayers();
  currentPolygon = e.layer;
  drawnItems.addLayer(currentPolygon);

  const coords = currentPolygon.getLatLngs()[0];
  coords.forEach((point,index) => {
    set(ref(db, 'fence/' + index), { lat:point.lat, lon:point.lng });
  });

  alert("Fence Saved!");
});

// Load Fence from DB
onValue(ref(db,'fence'), snapshot => {
  drawnItems.clearLayers();
  const data = snapshot.val();
  if(!data) return;
  const coords = Object.values(data).map(p => [p.lat,p.lon]);
  if(coords.length>0){
    currentPolygon = L.polygon(coords,{color:'green'});
    drawnItems.addLayer(currentPolygon);
  }
});

// Point in Polygon
function pointInPolygon(point, vs){
  let x=point[0],y=point[1],inside=false;
  for(let i=0,j=vs.length-1;i<vs.length;j=i++){
    let xi=vs[i][0],yi=vs[i][1],xj=vs[j][0],yj=vs[j][1];
    let intersect=((yi>y)!=(yj>y))&&(x<(xj-xi)*(y-yi)/(yj-yi)+xi);
    if(intersect) inside=!inside;
  }
  return inside;
}

// Listen to Animal GPS
onValue(ref(db,'animal'), snapshot=>{
  const data=snapshot.val();
  if(!data||!data.lat||!data.lon) return;

  const latVal=data.lat;
  const lonVal=data.lon;
  document.getElementById("lat").innerText = latVal.toFixed(6);
  document.getElementById("lon").innerText = lonVal.toFixed(6);

  marker.setLatLng([latVal,lonVal]);
  map.setView([latVal,lonVal],17);

  if(!currentPolygon) return;
  const polyCoords = currentPolygon.getLatLngs()[0].map(p=>[p.lat,p.lng]);
  const inside = pointInPolygon([latVal,lonVal], polyCoords);

  const statusEl = document.getElementById("status");
  if(inside){
    statusEl.innerText="SAFE";
    statusEl.style.background="green";
    currentPolygon.setStyle({color:'green'});
  } else {
    statusEl.innerText="OUTSIDE";
    statusEl.style.background="red";
    currentPolygon.setStyle({color:'red'});
    if(Notification.permission==="granted"){
      new Notification("Animal Left Fence!");
    }
  }
});

// Request Notifications
if("Notification" in window){
  Notification.requestPermission();
}

</script>
</body>
</html>
